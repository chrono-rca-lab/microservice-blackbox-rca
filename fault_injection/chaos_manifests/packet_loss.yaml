apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: packet-loss-TARGET
  namespace: boutique
spec:
  action: loss
  mode: one
  selector:
    namespaces:
      - boutique
    labelSelectors:
      app: TARGET_SERVICE
  loss:
    loss: "30"
    correlation: "50"
  duration: "DURATION_VALUE"
