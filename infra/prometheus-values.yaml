# kube-prometheus-stack on kind defaults.
# 1s scrape ≈120 points in a two-minute incident—fine for change-point work.
prometheus:
  prometheusSpec:
    scrapeInterval: 1s
    evaluationInterval: 1s
    additionalScrapeConfigs:
      - job_name: "slo-exporter"
        scrape_interval: 1s
        static_configs:
          - targets: ["host.docker.internal:9108"]

# kubelet / cAdvisor scrape config override
kubelet:
  serviceMonitor:
    interval: 1s
    cAdvisorRelabelings:
      # Keep the job label as "kubelet"
      - action: replace
        targetLabel: job
        replacement: kubelet
      # Copy the internal __metrics_path__ into a real label so that
      # recording rules that filter on metrics_path="/metrics/cadvisor" work.
      - sourceLabels: [__metrics_path__]
        targetLabel: metrics_path

grafana:
  adminPassword: admin
