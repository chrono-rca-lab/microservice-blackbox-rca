# Custom values for kube-prometheus-stack on kind.
# Sets cAdvisor scrape interval to 5s (1s is too aggressive for kind).
prometheus:
  prometheusSpec:
    scrapeInterval: 5s
    evaluationInterval: 5s

# kubelet / cAdvisor scrape config override
kubelet:
  serviceMonitor:
    interval: 5s
    cAdvisorRelabelings:
      # Keep the job label as "kubelet"
      - action: replace
        targetLabel: job
        replacement: kubelet
      # Copy the internal __metrics_path__ into a real label so that
      # recording rules that filter on metrics_path="/metrics/cadvisor" work.
      - sourceLabels: [__metrics_path__]
        targetLabel: metrics_path

grafana:
  adminPassword: admin
