kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: fchain-rca
nodes:
  - role: control-plane
    # 10s cadvisor housekeeping: ~12 samples inside a typical 120s fault run.
    # metrics_client wider rate/deriv windows expect a couple housekeeping ticks each.
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            housekeeping-interval: "10s"

  # kind does not support port ranges; list each NodePort individually.
  # Ports here cover the services we will expose (frontend, prometheus, grafana,
  # jaeger, and a few spares).  Add more entries as needed.
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            housekeeping-interval: "10s"
            system-reserved: "cpu=500m,memory=512Mi"
    extraPortMappings:
      - containerPort: 30000
        hostPort: 30000
        protocol: TCP
      - containerPort: 30001
        hostPort: 30001
        protocol: TCP
      - containerPort: 30002
        hostPort: 30002
        protocol: TCP
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      - containerPort: 30090
        hostPort: 30090
        protocol: TCP
      - containerPort: 30091
        hostPort: 30091
        protocol: TCP
      - containerPort: 30100
        hostPort: 30100
        protocol: TCP
    extraMounts:
      - hostPath: /tmp/kind-volumes
        containerPath: /tmp/kind-volumes

  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            housekeeping-interval: "10s"
            system-reserved: "cpu=500m,memory=512Mi"
    extraMounts:
      - hostPath: /tmp/kind-volumes
        containerPath: /tmp/kind-volumes

  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            housekeeping-interval: "10s"
            system-reserved: "cpu=500m,memory=512Mi"
    extraMounts:
      - hostPath: /tmp/kind-volumes
        containerPath: /tmp/kind-volumes
