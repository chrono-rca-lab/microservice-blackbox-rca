kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: fchain-rca
nodes:
  - role: control-plane
    # cAdvisor housekeeping interval — set to 1s for high-resolution data collection.
    # This gives one real data point per second per container.
    # Rate/deriv windows in metrics_client.py use [30s]/[45s] to smooth over noise.
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            housekeeping-interval: "1s"

  # kind does not support port ranges; list each NodePort individually.
  # Ports here cover the services we will expose (frontend, prometheus, grafana,
  # jaeger, and a few spares).  Add more entries as needed.
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            housekeeping-interval: "1s"
    extraPortMappings:
      - containerPort: 30000
        hostPort: 30000
        protocol: TCP
      - containerPort: 30001
        hostPort: 30001
        protocol: TCP
      - containerPort: 30002
        hostPort: 30002
        protocol: TCP
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      - containerPort: 30090
        hostPort: 30090
        protocol: TCP
      - containerPort: 30091
        hostPort: 30091
        protocol: TCP
      - containerPort: 30100
        hostPort: 30100
        protocol: TCP
    extraMounts:
      - hostPath: /tmp/kind-volumes
        containerPath: /tmp/kind-volumes

  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            housekeeping-interval: "1s"
    extraMounts:
      - hostPath: /tmp/kind-volumes
        containerPath: /tmp/kind-volumes

  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            housekeeping-interval: "1s"
    extraMounts:
      - hostPath: /tmp/kind-volumes
        containerPath: /tmp/kind-volumes
