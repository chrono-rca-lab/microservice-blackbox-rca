# Experiment matrix for microservice-blackbox-rca
# Run with: python eval/run_batch.py --matrix experiments/experiment_matrix.yaml
#
# injector: "chaos" uses fault_injection/chaos_inject.py (Chaos Mesh CRDs)
#           "exec"  uses fault_injection/inject.py        (kubectl exec — shell required)
#
# Injectable services (have /bin/sh): adservice, currencyservice, emailservice,
#                                     paymentservice, recommendationservice
# Distroless (no shell, cannot inject via exec): cartservice, checkoutservice, frontend,
#                                                productcatalogservice, shippingservice
#
# Requires infra/boutique-manifests-patched.yaml to be applied so that:
#   - readOnlyRootFilesystem is removed  (disk_hog needs writable /tmp)
#   - NET_ADMIN is present               (net_delay needs tc netem)
#   - emptyDir at /tmp is mounted        (provides a block-backed writable path)
# Run: bash infra/deploy-boutique.sh   to apply the patches.

cooldown_seconds: 120

experiments:

  # ── cpu_hog ──────────────────────────────────────────────────────────────
  # Shell-based services (exec works; chaos also works)
  - fault: cpu_hog
    service: adservice
    duration: 120
    injector: chaos

  - fault: cpu_hog
    service: recommendationservice
    duration: 120
    injector: chaos

  - fault: cpu_hog
    service: emailservice
    duration: 120
    injector: chaos

  - fault: cpu_hog
    service: currencyservice
    duration: 120
    injector: chaos

  # Distroless Go services — StressChaos injects a binary, may work
  - fault: cpu_hog
    service: frontend
    duration: 120
    injector: chaos

  - fault: cpu_hog
    service: checkoutservice
    duration: 120
    injector: chaos

  # ── mem_leak ─────────────────────────────────────────────────────────────
  - fault: mem_leak
    service: recommendationservice
    duration: 120
    injector: chaos

  - fault: mem_leak
    service: emailservice
    duration: 120
    injector: chaos

  - fault: mem_leak
    service: frontend
    duration: 120
    injector: chaos

  # ── net_delay ────────────────────────────────────────────────────────────
  # NetworkChaos works on distroless — big win, covers all services
  - fault: net_delay
    service: frontend
    duration: 120
    injector: chaos

  - fault: net_delay
    service: checkoutservice
    duration: 120
    injector: chaos

  - fault: net_delay
    service: cartservice
    duration: 120
    injector: chaos

  - fault: net_delay
    service: productcatalogservice
    duration: 120
    injector: chaos

  - fault: net_delay
    service: currencyservice
    duration: 120
    injector: chaos

  - fault: net_delay
    service: paymentservice
    duration: 120
    injector: chaos

  - fault: net_delay
    service: shippingservice
    duration: 120
    injector: chaos

  # ── disk_hog ─────────────────────────────────────────────────────────────
  - fault: disk_hog
    service: currencyservice
    duration: 120
    injector: chaos

  - fault: disk_hog
    service: emailservice
    duration: 120
    injector: chaos

  # ── packet_loss ──────────────────────────────────────────────────────────
  - fault: packet_loss
    service: frontend
    duration: 120
    injector: chaos

  - fault: packet_loss
    service: cartservice
    duration: 120
    injector: chaos

  # ── concurrent faults ────────────────────────────────────────────────────
  - fault: cpu_hog
    service: emailservice
    concurrent: currencyservice
    duration: 120
    injector: chaos

  - fault: net_delay
    service: frontend
    concurrent: checkoutservice
    duration: 120
    injector: chaos
