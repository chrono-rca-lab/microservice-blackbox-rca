# Experiment matrix for microservice-blackbox-rca
# Run with: python eval/run_batch.py --matrix experiments/experiment_matrix.yaml
#
# injector: "chaos" uses fault_injection/chaos_inject.py (Chaos Mesh CRDs)
#           "exec"  uses fault_injection/inject.py        (kubectl exec — shell required)
#
# Pods with shells: adservice, currencyservice, emailservice,
#                    paymentservice, recommendationservice.
# Pure distroless (skip exec injector): cartservice, checkoutservice, frontend,
#                                       productcatalogservice, shippingservice.
#
# Boutique needs the patched manifests (writable /tmp + NET_ADMIN, etc.);
# infra/deploy-boutique.sh applies them.

cooldown_seconds: 120

experiments:

  # ── cpu_hog ──────────────────────────────────────────────────────────────
  # Shell-based services (exec works; chaos also works)
  - fault: cpu_hog
    service: adservice
    duration: 120
    injector: chaos

  - fault: cpu_hog
    service: recommendationservice
    duration: 120
    injector: chaos

  - fault: cpu_hog
    service: emailservice
    duration: 120
    injector: chaos

  - fault: cpu_hog
    service: currencyservice
    duration: 120
    injector: chaos

  # Distroless Go services — StressChaos injects a binary, may work
  - fault: cpu_hog
    service: frontend
    duration: 120
    injector: chaos

  - fault: cpu_hog
    service: checkoutservice
    duration: 120
    injector: chaos

  # ── mem_leak ─────────────────────────────────────────────────────────────
  - fault: mem_leak
    service: recommendationservice
    duration: 120
    injector: chaos

  - fault: mem_leak
    service: emailservice
    duration: 120
    injector: chaos

  - fault: mem_leak
    service: frontend
    duration: 120
    injector: chaos

  # ── net_delay ────────────────────────────────────────────────────────────
  # NetworkChaos works on distroless — big win, covers all services
  - fault: net_delay
    service: frontend
    duration: 120
    injector: chaos

  - fault: net_delay
    service: checkoutservice
    duration: 120
    injector: chaos

  - fault: net_delay
    service: cartservice
    duration: 120
    injector: chaos

  - fault: net_delay
    service: productcatalogservice
    duration: 120
    injector: chaos

  - fault: net_delay
    service: currencyservice
    duration: 120
    injector: chaos

  - fault: net_delay
    service: paymentservice
    duration: 120
    injector: chaos

  - fault: net_delay
    service: shippingservice
    duration: 120
    injector: chaos

  # ── disk_hog ─────────────────────────────────────────────────────────────
  # IOChaos requires FUSE (unavailable on kind) — run_experiment.py
  # automatically falls back to kubectl-exec (shell-based inject.py).
  - fault: disk_hog
    service: currencyservice
    duration: 120
    injector: exec

  - fault: disk_hog
    service: emailservice
    duration: 120
    injector: exec

  # ── packet_loss ──────────────────────────────────────────────────────────
  - fault: packet_loss
    service: frontend
    duration: 120
    injector: chaos

  - fault: packet_loss
    service: cartservice
    duration: 120
    injector: chaos

  # ── concurrent faults ────────────────────────────────────────────────────
  - fault: cpu_hog
    service: emailservice
    concurrent: currencyservice
    duration: 120
    injector: chaos

  - fault: net_delay
    service: frontend
    concurrent: checkoutservice
    duration: 120
    injector: chaos
